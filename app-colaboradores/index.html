<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Fundo escuro imediato enquanto JS carrega — elimina flash branco na abertura -->
    <style>html,body,#root{background:#0f172a;margin:0;padding:0;height:100%}</style>
    <title>Apex Colaboradores</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="early-error-display" style="display:none; padding:20px; color:#ef4444; background:#fef2f2; font-family:monospace; font-size:14px; position:fixed; top:0; left:0; right:0; bottom:0; overflow:auto; z-index:999999;">
      <h3 style="margin-top:0; color:#b91c1c;">Erro no Aplicativo (Tela em Branco)</h3>
      <p>Ocorreu um erro ao carregar o aplicativo. Por favor, envie uma foto/texto deste erro para o desenvolvedor:</p>
      <pre id="early-error-text" style="white-space:pre-wrap; word-break:break-all; background:#fee2e2; padding:10px; border-radius:4px; border:1px solid #fca5a5; font-size:12px;"></pre>
      <button onclick="window.location.reload()" style="margin-top:15px; padding:10px 16px; background:#ef4444; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Tentar Novamente</button>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var display = document.getElementById('early-error-display');
        var text = document.getElementById('early-error-text');
        if (display && text) {
          display.style.display = 'block';
          text.textContent += '\nError: ' + e.message + '\nSource: ' + e.filename + ':' + e.lineno + ':' + e.colno + '\nStack: ' + (e.error ? e.error.stack : 'N/A') + '\n';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var display = document.getElementById('early-error-display');
        var text = document.getElementById('early-error-text');
        if (display && text) {
          display.style.display = 'block';
          text.textContent += '\nPromise Rejection: ' + (e.reason ? (e.reason.message || e.reason) : 'Unknown reason') + '\nStack: ' + (e.reason && e.reason.stack ? e.reason.stack : 'N/A') + '\n';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
